const fmtDate = ts => {
  if(!ts) return 'Today';
  const d=new Date(ts),n=new Date();
  if(d.toDateString()===n.toDateString()) return 'Today';
  const y=new Date(n); y.setDate(n.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'long',day:'numeric'});
};

  ov.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',close));

}

let me=null, pn=null, activeCid=null, activeOther=null;
let msgsRef=null, sideUnsub=null, onlineUnsub=null, typingTimer=null;

/* ── PubNub — set up once, never re-add listeners ── */
function initPN(uid){
  if(pn){try{pn.unsubscribeAll();}catch(e){}}
  pn=new PubNub({publishKey:PUBNUB_PUBLISH_KEY,subscribeKey:PUBNUB_SUBSCRIBE_KEY,uuid:uid});
  pn.addListener({
    message(ev){
      // New message from the other person arrives here
      if(!activeCid||ev.channel!==`conv.${activeCid}`) return;
      if(ev.message.uid===me.uid) return; // ignore own — shown optimistically on send
      const m=ev.message;
      // Don't render if already in DOM (safety check)
      if(m._key && document.querySelector(`.msg-row[data-key="${m._key}"]`)) return;
      const box=$('msgs'); if(!box) return;
      const ds=fmtDate(m.ts);
      if(ds!==lastDateShown){addDateSep(box,ds);lastDateShown=ds;}
      addMsgEl(box,m,true);
      scrollBottom();
    },
    signal(ev){
      if(!activeCid||ev.channel!==`conv.${activeCid}`||ev.publisher===me.uid) return;
      const ti=$('typing-ind'); if(!ti) return;
      ti.style.display='flex';
      clearTimeout(ti._t); ti._t=setTimeout(()=>ti.style.display='none',2500);
    }
  });
  pn.subscribe({channels:[`user.${uid}`]});
}
function sendTyping(){if(pn&&activeCid)pn.signal({channel:`conv.${activeCid}`,message:'typing'}).catch(()=>{});}

  const c=await createUserWithEmailAndPassword(auth,email,pass);
  await updateProfile(c.user,{displayName:name});
  await set(ref(db,`users/${c.user.uid}`),{uid:c.user.uid,displayName:name,email,online:true,createdAt:Date.now()});
}

async function doLogout(){
  if(me) await update(ref(db,`users/${me.uid}`),{online:false}).catch(()=>{});
  await signOut(auth);
}

onAuthStateChanged(auth,user=>{
  if(user){
    me=user;
    onDisconnect(ref(db,`users/${user.uid}/online`)).set(false);
    update(ref(db,`users/${user.uid}`),{uid:user.uid,displayName:user.displayName||user.email.split('@')[0],email:user.email,online:true}).catch(()=>{});
    try{initPN(user.uid);}catch(e){}
    buildApp(); showScreen('app');
  } else {
    me=null;
    if(pn){try{pn.unsubscribeAll();}catch(e){} pn=null;}
    stopMsgs(); if(sideUnsub){sideUnsub();sideUnsub=null;} if(onlineUnsub){onlineUnsub();onlineUnsub=null;}
    activeCid=null; activeOther=null;
    showScreen('auth');
  }
});

function stopMsgs(){
  if(msgsRef){off(msgsRef);msgsRef=null;}
}

async function searchUsers(term){
  const snap=await get(ref(db,'users')); const res=[];
  if(!snap.exists()) return res;
  snap.forEach(c=>{
    const u=c.val(); if(u.uid===me.uid) return;
    const t=term.toLowerCase();
    if((u.displayName||'').toLowerCase().includes(t)||(u.email||'').toLowerCase().includes(t)) res.push(u);
  });
  return res;
}
async function changeName(name){
  name=name.trim(); if(!name) return;
  await updateProfile(me,{displayName:name});
  await update(ref(db,`users/${me.uid}`),{displayName:name});
  me=auth.currentUser;
  const el=$('profile-name'); if(el) el.innerHTML=esc(name)+dev(name);
  toast('Name updated!','success');
}

async function getOrCreate(other){
  const id=cid(me.uid,other.uid);
  const snap=await get(ref(db,`conversations/${id}`));
  if(!snap.exists()) await set(ref(db,`conversations/${id}`),{
    id,
    participants:{[me.uid]:true,[other.uid]:true},
    participantNames:{[me.uid]:me.displayName,[other.uid]:other.displayName},
    lastMessage:'',lastTs:Date.now(),createdAt:Date.now()
  });
  return id;
}

function listenSidebar(){
  if(sideUnsub){sideUnsub();sideUnsub=null;}
  const r=ref(db,'conversations');
  const h=snap=>{
    const list=[];
    if(snap.exists()) snap.forEach(c=>{
      const v=c.val();
      // participants stored as {uid: true} object OR legacy array — handle both
      const parts=v.participants;
      let inConv = false;
      if(parts){
        if(Array.isArray(parts)){
          // plain JS array
          inConv = parts.includes(me.uid);
        } else if(typeof parts === 'object'){
          // could be {uid:true} OR Firebase-serialised array {0:uid1, 1:uid2}
          inConv = Object.values(parts).some(v=>v===me.uid||v===true&&parts[me.uid]);
          if(!inConv) inConv = !!parts[me.uid];
        }
      }
      if(inConv) list.push(v);
    });
    list.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
    renderSidebar(list);
  };
  onValue(r,h); sideUnsub=()=>off(r,'value',h);
}

/* ══════════════════════════════
   MESSAGE LISTENER
   Uses PubNub to receive messages in real time.
   Firebase stores them. PubNub delivers them instantly.
   This avoids ALL onValue duplicate issues.
══════════════════════════════ */
function listenMsgs(convId){
  stopMsgs();
  const box=$('msgs'); if(!box) return;
  box.innerHTML='';

  // Load existing messages once with get()
  get(ref(db,`conversations/${convId}/messages`)).then(snap=>{
    const box2=$('msgs'); if(!box2) return;
    if(snap.exists()){
      let lastD='';
      snap.forEach(c=>{
        const m={...c.val(),_key:c.key};
        const ds=fmtDate(m.ts);
        if(ds!==lastD){addDateSep(box2,ds);lastD=ds;}
        addMsgEl(box2,m,false);
      });
    }
    scrollBottom();
  }).catch(e=>console.error('load msgs',e));

  // PubNub subscription handled in openConv
}

// onPNMessage moved into initPN listener above

function addDateSep(box,ds){
  const sep=mk('div'); sep.className='date-sep';
  sep.innerHTML=`<span>${ds}</span>`;
  box.appendChild(sep);
}

function addMsgEl(box,m,animate){
  const own=m.uid===me.uid;
  const w=mk('div');
  w.className=`msg-row ${own?'msg-own':'msg-other'}`;
  w.dataset.key=m._key||'';
  w.innerHTML=`
    ${!own?`<div class="msg-av">${avEl(m.sender,28)}</div>`:''}
    <div class="msg-col">
      ${!own?`<div class="msg-meta"><span class="msg-auth">${esc(m.sender)}${dev(m.sender)}</span><span class="msg-ts">${fmt(m.ts)}</span></div>`:''}
      <div class="bubble ${own?'bown':'bother'}">${esc(m.text).replace(/\n/g,'<br/>')}${own?`<button class="msg-del" data-key="${m._key||''}">✕</button>`:''}</div>
      ${own?`<div class="msg-ts-own">${fmt(m.ts)}</div>`:''}
    </div>`;
  if(own){
    w.querySelector('.msg-del').addEventListener('click',e=>{
      e.stopPropagation(); delMsg(activeCid,e.currentTarget.dataset.key);
    });
  }
  box.appendChild(w);
  if(animate){
    requestAnimationFrame(()=>requestAnimationFrame(()=>w.classList.add('msg-in')));
  } else {
    w.classList.add('msg-in');
  }
}

function scrollBottom(){const w=$('msgs-wrap');if(w)w.scrollTop=w.scrollHeight;}

async function sendMsg(text){
  if(!activeCid||!text.trim()) return;
  const key=push(ref(db,`conversations/${activeCid}/messages`)).key;
  const m={uid:me.uid,sender:me.displayName,text:text.trim(),ts:Date.now(),_key:key};

  // Show message on sender's screen immediately (optimistic)
  const box=$('msgs');
  if(box){
    const ds=fmtDate(m.ts);
    if(ds!==lastDateShown){addDateSep(box,ds);lastDateShown=ds;}
    addMsgEl(box,m,true);
    scrollBottom();
  }

  // Save to Firebase
  await set(ref(db,`conversations/${activeCid}/messages/${key}`),{
    uid:me.uid,sender:me.displayName,text:text.trim(),ts:Date.now()
  });

  // Publish via PubNub so other user gets it instantly
  if(pn){
    pn.publish({channel:`conv.${activeCid}`,message:{...m}}).catch(()=>{});
  }

  update(ref(db,`conversations/${activeCid}`),{lastMessage:text.trim().slice(0,80),lastTs:Date.now()}).catch(()=>{});
}

async function delMsg(convId,key){
  document.querySelector(`.msg-row[data-key="${key}"]`)?.remove();
  await remove(ref(db,`conversations/${convId}/messages/${key}`));
}
async function delConv(id){
  await remove(ref(db,`conversations/${id}`));
  if(activeCid===id){activeCid=null;activeOther=null;showEmpty();}
}

function watchOnline(uid){
  if(onlineUnsub){onlineUnsub();onlineUnsub=null;}
  const r=ref(db,`users/${uid}/online`);
  const h=snap=>setOnlineUI(snap.exists()&&snap.val()===true);
  onValue(r,h); onlineUnsub=()=>off(r,'value',h);
}

}

function showEmpty(){
  const e=$('empty-main'),c=$('chat-panel');
  if(e)e.style.display='flex'; if(c)c.style.display='none';
}

function renderSidebar(list){
  const el=$('conv-list'); if(!el) return;
  if(!list.length){el.innerHTML='<div class="empty-hint">No conversations yet.<br/>Search for someone above.</div>';return;}
  el.innerHTML=list.map(c=>{
    const parts=c.participants||{};
    const oid = Array.isArray(parts)
      ? parts.find(p=>p!==me.uid)||''
      : Object.keys(parts).find(p=>p!==me.uid)||'';
    const oname=c.participantNames?.[oid]||'Unknown';
    const last=c.lastMessage?esc(c.lastMessage.slice(0,40))+(c.lastMessage.length>40?'…':''):'No messages yet';
    return `<div class="conv-item${c.id===activeCid?' conv-active':''}" data-cid="${c.id}" data-uid="${oid}" data-name="${esc(oname)}">
      ${avEl(oname,38)}
      <div class="conv-info">
        <div class="conv-name">${esc(oname)}${dev(oname)}</div>
        <div class="conv-last">${last}</div>
      </div>
      <button class="conv-del icon-btn danger" data-cid="${c.id}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');
  el.querySelectorAll('.conv-item').forEach(it=>{
    it.addEventListener('click',e=>{
      if(e.target.closest('.conv-del')) return;
      openConv(it.dataset.cid,{uid:it.dataset.uid,displayName:it.dataset.name});
    });
  });
  el.querySelectorAll('.conv-del').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();confirmDlg('Delete this conversation?',()=>delConv(btn.dataset.cid));});
  });
}

function openConv(id,other){
  activeCid=id; activeOther=other;
  $('empty-main').style.display='none';
  $('chat-panel').style.display='flex';
  if(window.innerWidth<=680){$('sidebar').classList.add('hidden');$('main').classList.add('visible');}
  $('chat-av').innerHTML=avEl(other.displayName,38);
  $('chat-name').innerHTML=esc(other.displayName)+dev(other.displayName);
  $('typing-name').textContent=other.displayName;
  watchOnline(other.uid);
  // Subscribe to conv channel for real-time messages
  if(pn) pn.subscribe({channels:[`conv.${id}`]});
  listenMsgs(id);
  document.querySelectorAll('.conv-item').forEach(i=>i.classList.toggle('conv-active',i.dataset.cid===id));
  $('msg-inp').focus();
}

function bindApp(){
  $('back-btn').addEventListener('click',()=>{$('sidebar').classList.remove('hidden');$('main').classList.remove('visible');});
  $('edit-btn').addEventListener('click',()=>{
    const {ov,close}=openModal(`
      <div class="modal-header">
        <span class="modal-ttl">Change display name</span>
        <button class="btn-ghost" data-close style="padding:4px 10px">✕</button>
      </div>
      <input id="name-inp" class="modal-inp" type="text" value="${esc(me.displayName||'')}"/>
      <div class="modal-btns">
        <button class="btn-ghost" data-close>Cancel</button>
        <button class="btn-primary" id="save-name">Save</button>
      </div>`);
    const inp=ov.querySelector('#name-inp'); inp.focus(); inp.select();
    ov.querySelector('#save-name').addEventListener('click',async()=>{await changeName(inp.value);close();});
    inp.addEventListener('keydown',async e=>{if(e.key==='Enter'){await changeName(inp.value);close();}});
  });
  $('logout-btn').addEventListener('click',async()=>{await doLogout();toast('Signed out.');});
  $('del-conv-btn').addEventListener('click',()=>{if(activeCid)confirmDlg('Delete this conversation?',()=>delConv(activeCid));});
  let st;
  $('search-inp').addEventListener('input',e=>{
    clearTimeout(st); const v=e.target.value.trim();
    if(!v){$('search-res').innerHTML='';return;}
    st=setTimeout(async()=>renderSearch(await searchUsers(v)),300);
  });
  const EMOJIS=['😀','😂','😍','🥰','😎','🤔','😢','😡','🤩','🥳','👍','👎','❤️','🔥','✨','💯','🎉','🚀','💀','😭','🙏','💪','👀','🤣','😅','😬','🤦','🤷','💬','⚡','🌙','⭐','💜','🖤','🤍','😏','🫡','🫠','💅','🧠'];
  const ep=$('emoji-panel');
  ep.innerHTML=EMOJIS.map(e=>`<button class="em-btn" data-em="${e}">${e}</button>`).join('');
  ep.querySelectorAll('.em-btn').forEach(b=>b.addEventListener('click',()=>{
    const inp=$('msg-inp'); inp.value+=b.dataset.em; inp.focus(); ep.style.display='none';
  }));
  $('emoji-btn').addEventListener('click',e=>{e.stopPropagation();ep.style.display=ep.style.display==='none'?'flex':'none';});
  document.addEventListener('click',e=>{if(!ep.contains(e.target)&&e.target.id!=='emoji-btn')ep.style.display='none';});
  $('send-btn').addEventListener('click',doSend);
  $('msg-inp').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}
    else{clearTimeout(typingTimer);typingTimer=setTimeout(sendTyping,400);}
  });
  $('msg-inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
}

async function doSend(){
  const inp=$('msg-inp'),text=inp.value.trim();
  if(!text||!activeCid) return;
  inp.value=''; inp.style.height='auto';
  try{await sendMsg(text);}catch(e){toast('Failed to send.','error');console.error(e);}
}

function renderSearch(users){
  const sr=$('search-res');
  if(!users.length){sr.innerHTML='<div class="no-res">No users found.</div>';return;}
  sr.innerHTML=users.map(u=>`
    <div class="search-item" data-uid="${u.uid}" data-name="${esc(u.displayName)}">
      ${avEl(u.displayName,32)}
      <div class="si-info">
        <div class="si-name">${esc(u.displayName)}${dev(u.displayName)}</div>
        <div class="si-email">${esc(u.email)}</div>
      </div>
    </div>`).join('');
  sr.querySelectorAll('.search-item').forEach(it=>{
    it.addEventListener('click',async()=>{
      const other={uid:it.dataset.uid,displayName:it.dataset.name};
      $('search-inp').value='';$('search-res').innerHTML='';
      openConv(await getOrCreate(other),other);
    });
  });
}

;(function(){
  document.querySelectorAll('.auth-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      $('auth-err').textContent='';
      const login=tab.dataset.tab==='login';
      $('sf').style.display=login?'none':'flex';
      $('auth-submit').textContent=login?'Sign In':'Create Account';
      $('auth-title').textContent=login?'Welcome back':'Create account';
    });
  });
  $('auth-form').addEventListener('submit',async e=>{
    e.preventDefault(); $('auth-err').textContent='';
    const isLogin=document.querySelector('.auth-tab.active').dataset.tab==='login';
    const email=$('auth-email').value.trim(), pass=$('auth-pass').value;
    const btn=$('auth-submit'); btn.disabled=true; btn.textContent='Loading…';
    try{
      if(isLogin){await doLogin(email,pass);toast('Welcome back!','success');}
      else{
        const name=$('auth-name').value.trim();
        if(!name) throw new Error('Display name required.');
        await doSignUp(email,pass,name); toast('Account created!','success');
      }
    }catch(err){
      const c=err.code||'';
      let msg='Something went wrong.';
      if(c==='auth/email-already-in-use')   msg='Email already in use. Try signing in.';
      else if(c==='auth/weak-password')      msg='Password must be 6+ characters.';
      else if(c==='auth/invalid-email')      msg='Invalid email address.';
      else if(c==='auth/invalid-credential') msg='Incorrect email or password.';
      else if(c==='auth/too-many-requests')  msg='Too many attempts. Try later.';
      else if(err.message)                   msg=err.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)\.?/,'').trim();
      $('auth-err').textContent=msg;
    }finally{
      btn.disabled=false;
      btn.textContent=document.querySelector('.auth-tab.active').dataset.tab==='login'?'Sign In':'Create Account';
    }
  });
})();
</script>

      <button class="auth-tab active" data-tab="login">Sign In</button>

      <div class="fg"><label>Password</label><input id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password" required/></div>

<script>
(function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<65;i++) pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,r:Math.random()*1.1+.2,a:Math.random()*.5+.1});
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){ctx.beginPath();ctx.strokeStyle=`rgba(138,43,226,${(1-d/130)*.16})`;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
    }
    for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(168,85,247,${p.a*.42})`;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;}
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
