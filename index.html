const $ = id => document.getElementById(id);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

}

function toast(msg, type='info') {
  const t = mk('div'); t.className=`toast toast-${type}`; t.textContent=msg;
  $('toasts').appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),350);},3000);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmt(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts) return 'Today';
  const d=new Date(ts), now=new Date();
  if(d.toDateString()===now.toDateString()) return 'Today';
  const y=new Date(now); y.setDate(now.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'long',day:'numeric'});
}

function av(name,size=36){
  const i=(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const c=['#8a2be2','#6a1cb2','#a044f0','#5a10a0','#7b2dd4'][i.charCodeAt(0)%5];
  return `<div class="av" style="width:${size}px;height:${size}px;background:${c};font-size:${Math.round(size*.38)}px">${i}</div>`;
}

function devBadge(name){ return name==='ASTRO'?'<span class="dev-tag">DEV</span>':''; }

function cid(a,b){ return [a,b].sort().join('_'); }

/* ── Modal ── */
function modal(html, onClose){
  const ov=mk('div'); ov.className='modal-ov';
  ov.innerHTML=`<div class="modal-box">${html}</div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
  const close=()=>{ ov.classList.remove('show'); setTimeout(()=>ov.remove(),250); if(onClose) onClose(); };
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  ov.querySelector('.modal-close')?.addEventListener('click', close);
  return { el:ov, close };
}

/* ── Confirm dialog ── */
function confirm(msg, onYes){
  const {el,close} = modal(`
    <button class="modal-close">✕</button>
    <p style="margin-bottom:18px;font-size:0.9rem;color:var(--text)">${esc(msg)}</p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn-ghost modal-close">Cancel</button>
      <button class="btn-danger" id="confirm-yes">Delete</button>
    </div>`);
  el.querySelector('#confirm-yes').addEventListener('click',()=>{ close(); onYes(); });
}

/* ── PubNub ── */
function initPN(uid){
  if(pn){ try{pn.unsubscribeAll();}catch(e){} }
  pn = new PubNub({ publishKey:PUBNUB_PUBLISH_KEY, subscribeKey:PUBNUB_SUBSCRIBE_KEY, uuid:uid });
  pn.addListener({
    presence(ev){
      if(!activeOther) return;
      if(ev.channel===`user.${activeOther.uid}`){ setOnline(ev.action==='join'||ev.occupancy>0); }
    },
    signal(ev){
      if(!activeCid||ev.channel!==`conv.${activeCid}`) return;
      if(ev.message==='typing'&&ev.publisher!==me.uid){
        const ti=$('typing-ind'); if(!ti) return;
        ti.style.display='flex'; scrollMsgs();
        clearTimeout(ti._t); ti._t=setTimeout(()=>ti.style.display='none',2500);
      }
    }
  });
  pn.subscribe({channels:[`user.${uid}`],withPresence:true});
}

function typing(){ if(pn&&activeCid) pn.signal({channel:`conv.${activeCid}`,message:'typing'}).catch(()=>{}); }

/* ── Auth ── */
async function signUp(email,pass,name){
  const c=await createUserWithEmailAndPassword(auth,email,pass);
  await updateProfile(c.user,{displayName:name});
  await set(ref(db,'users/'+c.user.uid),{uid:c.user.uid,displayName:name,email,online:true,createdAt:Date.now()});
}
async function logIn(e,p){ await signInWithEmailAndPassword(auth,e,p); }
async function logOut(){
  if(me) update(ref(db,'users/'+me.uid),{online:false}).catch(()=>{});
  await signOut(auth);
}

/* ── Auth state ── */
onAuthStateChanged(auth, user=>{
  if(user){
    me=user;
    update(ref(db,'users/'+user.uid),{uid:user.uid,displayName:user.displayName||user.email.split('@')[0],email:user.email,online:true}).catch(()=>{});
    try{initPN(user.uid);}catch(e){}
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',()=>{buildApp();showScreen('app');});
    else { buildApp(); showScreen('app'); }
  } else {
    me=null;
    if(pn){try{pn.unsubscribeAll();}catch(e){} pn=null;}
    if(convUnsub){convUnsub();convUnsub=null;}
    if(sidebarUnsub){sidebarUnsub();sidebarUnsub=null;}
    showScreen('auth');
  }
});

/* ── User search ── */
async function searchUsers(term){
  const snap=await get(ref(db,'users')); const res=[];
  if(!snap.exists()) return res;
  snap.forEach(c=>{ const u=c.val(); if(u.uid===me.uid) return;
    if((u.displayName||'').toLowerCase().includes(term.toLowerCase())||(u.email||'').toLowerCase().includes(term.toLowerCase())) res.push(u); });
  return res;
}

  const snap=await get(ref(db,'conversations/'+id));
  if(!snap.exists()) await set(ref(db,'conversations/'+id),{id,participants:[me.uid,other.uid],
    participantNames:{[me.uid]:me.displayName,[other.uid]:other.displayName},lastMessage:'',lastTs:Date.now(),createdAt:Date.now()});
  return id;
}

function listenSidebar(){
  if(sidebarUnsub){off(ref(db,'conversations'));sidebarUnsub=null;}
  const r=ref(db,'conversations');
  const h=snap=>{
    const list=[];
    if(snap.exists()) snap.forEach(c=>{ const v=c.val(); if(v.participants?.includes(me.uid)) list.push(v); });
    list.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
    renderConvs(list);
  };
  onValue(r,h); sidebarUnsub=()=>off(r,'value',h);
}

function listenMsgs(id){
  if(convUnsub){convUnsub();convUnsub=null;}
  const r=ref(db,'conversations/'+id+'/messages');
  // onValue does a full re-render each time = duplicates on send.
  // Fix: render once on first snapshot, then use child events for live updates.
  let initialDone=false;

  const fullH=snap=>{
    if(initialDone) return; // ignore subsequent full snapshots
    initialDone=true;
    const el=$('msgs'); if(!el) return;
    el.innerHTML=''; let lastD='';
    if(snap.exists()){
      snap.forEach(c=>{
        const m={...c.val(),_key:c.key};
        const ds=fmtDate(m.ts);
        if(ds!==lastD){ const sep=mk('div'); sep.className='date-sep'; sep.innerHTML=`<span>${ds}</span>`; el.appendChild(sep); lastD=ds; }
        appendMsg(m);
      });
    }
    scrollMsgs();
  };

  // child_added fires for existing + new children
  // We use it only AFTER the initial onValue has painted everything
  const addH=snap2=>{
    if(!initialDone) return; // wait for initial render
    const m={...snap2.val(),_key:snap2.key};
    if(document.querySelector(`.msg-row[data-key="${m._key}"]`)) return; // already rendered
    const el=$('msgs'); if(!el) return;
    const ds=fmtDate(m.ts);
    const lastSepTxt=el.querySelector('.date-sep:last-of-type span')?.textContent;
    if(ds!==lastSepTxt){ const sep=mk('div'); sep.className='date-sep'; sep.innerHTML=`<span>${ds}</span>`; el.appendChild(sep); }
    appendMsg(m); scrollMsgs();
  };

  const remH=snap2=>{
    document.querySelector(`.msg-row[data-key="${snap2.key}"]`)?.remove();
  };

  onValue(r,fullH,{onlyOnce:true});
  const u1=onValue(ref(db,'conversations/'+id+'/messages'),()=>{}); // keep connection
  // use raw on() for child events via the imported functions
  // Actually use onValue child simulation via the existing `onValue` + tracking
  // Simpler: just re-use onValue but guard against duplicates with a Set
  const seen=new Set();
  const mainH=snap=>{
    const el=$('msgs'); if(!el) return;
    if(!initialDone){
      initialDone=true;
      el.innerHTML=''; let lastD='';
      if(snap.exists()) snap.forEach(c=>{
        const m={...c.val(),_key:c.key}; seen.add(m._key);
        const ds=fmtDate(m.ts);
        if(ds!==lastD){ const sep=mk('div'); sep.className='date-sep'; sep.innerHTML=`<span>${ds}</span>`; el.appendChild(sep); lastD=ds; }
        appendMsg(m);
      });
      scrollMsgs();
    } else {
      // Only process new/removed keys
      const current=new Set();
      if(snap.exists()) snap.forEach(c=>current.add(c.key));
      // Remove deleted
      seen.forEach(k=>{ if(!current.has(k)){ document.querySelector(`.msg-row[data-key="${k}"]`)?.remove(); seen.delete(k); } });
      // Add new
      if(snap.exists()) snap.forEach(c=>{
        if(!seen.has(c.key)){
          seen.add(c.key);
          const m={...c.val(),_key:c.key};
          const ds=fmtDate(m.ts);
          const lastSepTxt=el.querySelector('.date-sep:last-of-type span')?.textContent;
          if(ds!==lastSepTxt){ const sep=mk('div'); sep.className='date-sep'; sep.innerHTML=`<span>${ds}</span>`; el.appendChild(sep); }
          appendMsg(m); scrollMsgs();
        }
      });
    }
  };
  onValue(r,mainH);
  convUnsub=()=>off(r,'value',mainH);
}

async function sendMsg(text){
  if(!activeCid||!text.trim()) return;
  const msg={uid:me.uid,sender:me.displayName,text:text.trim(),ts:Date.now()};
  await push(ref(db,'conversations/'+activeCid+'/messages'),msg);
  await update(ref(db,'conversations/'+activeCid),{lastMessage:text.trim().slice(0,80),lastTs:Date.now()});
}

async function deleteMsg(convId,key){
  await remove(ref(db,'conversations/'+convId+'/messages/'+key));
}

/* ── Render conv list ── */
function renderConvs(list){
  const el=$('conv-list'); if(!el) return;
  if(!list.length){ el.innerHTML='<div class="empty-hint">No conversations yet.<br/>Search for someone above.</div>'; return; }
  el.innerHTML=list.map(c=>{
    const oid=c.participants.find(p=>p!==me.uid);
    const oname=c.participantNames?.[oid]||'Unknown';
    const last=c.lastMessage?esc(c.lastMessage.slice(0,40))+(c.lastMessage.length>40?'…':''):'No messages yet';
    const active=c.id===activeCid?'conv-active':'';
    return `<div class="conv-item ${active}" data-cid="${c.id}" data-uid="${oid}" data-name="${esc(oname)}">
      ${av(oname,38)}
      <div class="conv-info">
        <div class="conv-name">${esc(oname)}${devBadge(oname)}</div>
        <div class="conv-last">${last}</div>
      </div>
      <button class="conv-del icon-btn danger" data-cid="${c.id}" title="Delete">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');

  el.querySelectorAll('.conv-item').forEach(it=>{
    it.addEventListener('click', e=>{
      if(e.target.closest('.conv-del')) return;
      openConv(it.dataset.cid,{uid:it.dataset.uid,displayName:it.dataset.name});
    });
  });
  el.querySelectorAll('.conv-del').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.stopPropagation();
      confirm('Delete this conversation? This cannot be undone.',()=>deleteConv(btn.dataset.cid));
    });
  });
}

/* ── Open conv ── */
async function openConv(id,other){
  activeCid=id; activeOther=other;
  $('empty-main').style.display='none';
  $('chat-panel').style.display='flex';
  if(window.innerWidth<=680){ $('sidebar').classList.add('hidden'); $('main').classList.add('visible'); }
  $('chat-av').innerHTML=av(other.displayName,38);
  $('chat-name').innerHTML=esc(other.displayName)+devBadge(other.displayName);
  $('typing-name').textContent=other.displayName;
  $('msgs').innerHTML='';
  pn?.subscribe({channels:[`conv.${id}`,`user.${other.uid}`],withPresence:true});
  listenMsgs(id);
  document.querySelectorAll('.conv-item').forEach(i=>i.classList.toggle('conv-active',i.dataset.cid===id));
  $('msg-inp').focus();
}

/* ── Append message ── */
function appendMsg(m){
  const el=$('msgs'); if(!el) return;
  const own=m.uid===me.uid;
  const w=mk('div'); w.className=`msg-row ${own?'msg-own':'msg-other'}`;
  w.dataset.key=m._key||'';
  w.innerHTML=`
    ${!own?`<div class="msg-av">${av(m.sender,28)}</div>`:''}
    <div class="msg-col">
      ${!own?`<div class="msg-meta"><span class="msg-auth">${esc(m.sender)}${devBadge(m.sender)}</span><span class="msg-ts">${fmt(m.ts)}</span></div>`:''}
      <div class="bubble ${own?'bown':'bother'}">${esc(m.text).replace(/\n/g,'<br/>')}
        ${own?`<button class="msg-del" data-key="${m._key||''}" title="Delete">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`:''}
      </div>
      ${own?`<div class="msg-ts-own">${fmt(m.ts)}</div>`:''}
    </div>`;
  el.appendChild(w);
  if(own) w.querySelector('.msg-del')?.addEventListener('click',e=>{
    e.stopPropagation();
    deleteMsg(activeCid,e.currentTarget.dataset.key);
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>w.classList.add('msg-in')));
}

function scrollMsgs(){ const w=$('msgs-wrap'); if(w) w.scrollTop=w.scrollHeight; }
function setOnline(on){
  const t=$('chat-status-txt'), d=document.querySelector('#chat-sub .dot');
  if(t) t.textContent=on?'Online':'Offline';
  if(d) d.style.background=on?'var(--green)':'var(--muted)';
}

/* ── Bind events ── */
function bindApp(){
  /* Back */
  $('back-btn').addEventListener('click',()=>{ $('sidebar').classList.remove('hidden'); $('main').classList.remove('visible'); });

  /* Edit name */
  $('edit-name-btn').addEventListener('click',()=>{
    const {el,close}=modal(`
      <button class="modal-close">✕</button>
      <h3 style="margin-bottom:16px;font-size:1rem;font-weight:700">Change display name</h3>
      <input id="new-name-inp" class="modal-inp" type="text" placeholder="New name…" value="${esc(me.displayName||'')}"/>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
        <button class="btn-ghost modal-close">Cancel</button>
        <button class="btn-primary" id="save-name-btn">Save</button>
      </div>`);
    const inp=el.querySelector('#new-name-inp'); inp.focus(); inp.select();
    el.querySelector('#save-name-btn').addEventListener('click',async()=>{ await changeDisplayName(inp.value); close(); });
    inp.addEventListener('keydown',async e=>{ if(e.key==='Enter'){ await changeDisplayName(inp.value); close(); } });
  });

  /* Logout */
  $('logout-btn').addEventListener('click',async()=>{ await logOut(); toast('Signed out.'); });

  /* Delete conv from header */
  $('del-conv-btn').addEventListener('click',()=>{
    if(!activeCid) return;
    confirm('Delete this entire conversation?',()=>deleteConv(activeCid));
  });

  /* Search */
  let st;
  $('search-inp').addEventListener('input',e=>{
    clearTimeout(st);
    const v=e.target.value.trim();
    if(!v){$('search-res').innerHTML='';return;}
    st=setTimeout(async()=>{ renderSearch(await searchUsers(v)); },300);
  });

  /* Send */
  $('send-btn').addEventListener('click',doSend);
  $('msg-inp').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}
    else{ clearTimeout(typingTimer); typingTimer=setTimeout(()=>typing(),400); }
  });
  $('msg-inp').addEventListener('input',function(){
    this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px';
  });
}

async function doSend(){
  const inp=$('msg-inp'), text=inp.value.trim();
  if(!text||!activeCid) return;
  inp.value=''; inp.style.height='auto';
  try{ await sendMsg(text); } catch(e){ toast('Failed to send.','error'); }
}

function renderSearch(users){
  const sr=$('search-res');
  if(!users.length){sr.innerHTML='<div class="no-res">No users found.</div>';return;}
  sr.innerHTML=users.map(u=>`
    <div class="search-item" data-uid="${u.uid}" data-name="${esc(u.displayName)}">
      ${av(u.displayName,32)}
      <div class="si-info">
        <div class="si-name">${esc(u.displayName)}${devBadge(u.displayName)}</div>
        <div class="si-email">${esc(u.email)}</div>
      </div>
    </div>`).join('');
  sr.querySelectorAll('.search-item').forEach(it=>{
    it.addEventListener('click',async()=>{
      const other={uid:it.dataset.uid,displayName:it.dataset.name};
      $('search-inp').value=''; $('search-res').innerHTML='';
      openConv(await getOrCreate(other),other);
    });
  });
}

/* ── Auth form ── */
;(function(){
  document.querySelectorAll('.auth-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      $('auth-err').textContent='';
      const login=tab.dataset.tab==='login';
      $('sf').style.display=login?'none':'flex';
      $('auth-submit').textContent=login?'Sign In':'Create Account';
      $('auth-title').textContent=login?'Welcome back':'Create account';
    });
  });

  $('auth-form').addEventListener('submit',async e=>{
    e.preventDefault(); $('auth-err').textContent='';
    const isLogin=document.querySelector('.auth-tab.active').dataset.tab==='login';
    const email=$('auth-email').value.trim(), pass=$('auth-pass').value;
    const btn=$('auth-submit'); btn.disabled=true; btn.textContent='Loading…';
    try{
      if(isLogin){ await logIn(email,pass); toast('Welcome back!','success'); }
      else{
        const name=$('auth-name').value.trim();
        if(!name) throw new Error('Display name required.');
        await signUp(email,pass,name); toast('Account created!','success');
      }
    } catch(err){
      const c=err.code||'';
      let msg='Something went wrong.';
      if(c==='auth/email-already-in-use') msg='Email already in use.';
      else if(c==='auth/weak-password')   msg='Password must be 6+ characters.';
      else if(c==='auth/invalid-email')   msg='Invalid email address.';
      else if(c==='auth/invalid-credential') msg='Incorrect email or password.';
      else if(c==='auth/too-many-requests')  msg='Too many attempts. Try later.';
      else if(err.message) msg=err.message.replace('Firebase: ','').replace(/\s*\(auth\/[^)]+\)\.?/,'').trim();
      $('auth-err').textContent=msg;
    } finally{ btn.disabled=false; btn.textContent=isLogin?'Sign In':'Create Account'; }
  });
})();
</script>

.bown{background:linear-gradient(148deg,#5e16b8,var(--ac),#9d3ef5);border-bottom-right-radius:3px;box-shadow:0 4px 18px rgba(138,43,226,.32);color:#fff}

.msg-del:hover{background:rgba(255,95,122,.28)}

#typing-ind{align-items:center;gap:8px;padding:8px 13px;background:var(--s2);border:1px solid var(--bd2);border-radius:13px;border-bottom-left-radius:3px;width:fit-content;margin-top:4px;font-size:.72rem;color:var(--muted)}
.typing-dots{display:flex;gap:3px;align-items:center}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tb 1.3s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.16s}
.typing-dots span:nth-child(3){animation-delay:.32s}
@keyframes tb{0%,60%,100%{transform:translateY(0);background:var(--muted)}30%{transform:translateY(-5px);background:var(--ac2)}}

/* Composer */
#composer{padding:12px 18px;background:rgba(7,7,12,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);flex-shrink:0}
#composer-in{display:flex;align-items:flex-end;gap:8px;background:var(--s2);border:1px solid var(--bd2);border-radius:13px;padding:6px 6px 6px 14px;transition:border-color .2s,box-shadow .2s}
#composer-in:focus-within{border-color:rgba(138,43,226,.38);box-shadow:0 0 0 3px rgba(138,43,226,.08)}

#send-btn:hover{transform:scale(1.08);box-shadow:0 5px 20px rgba(138,43,226,.55)}
#send-btn:active{transform:scale(.9)}

/* ── Mobile ── */
#back-btn{display:none}
@media(max-width:680px){
  #app{position:relative;overflow:hidden}
  #sidebar{width:100%;height:100%;position:absolute;z-index:10;transform:translateX(0);transition:transform .32s cubic-bezier(.16,1,.3,1)}

/* safe area for notched phones */
@supports(padding:max(0px)){
  #composer{padding-bottom:max(12px,env(safe-area-inset-bottom))}
}
</style>

    <div class="auth-sub">by <b>AstroFlux</b></div>

      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="signup">Sign Up</button>
    </div>

      <div class="fg"><label>Password</label><input id="auth-pass" type="password" placeholder="••••••••" autocomplete="current-password" required/></div>
      <p id="auth-err"></p>
      <button id="auth-submit" type="submit">Sign In</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen"></div>

<script>
(function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<65;i++) pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,r:Math.random()*1.1+.2,a:Math.random()*.5+.1});
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<130){ctx.beginPath();ctx.strokeStyle=`rgba(138,43,226,${(1-d/130)*.16})`;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
    }
    for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(168,85,247,${p.a*.42})`;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;}
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
