<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus by AstroFlux</title>

<script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.js"></script>

<script>
const PUBNUB_PUBLISH_KEY = "pub-c-0f810fcf-e8e9-4859-bba2-f35a6d515e57";
const PUBNUB_SUBSCRIBE_KEY = "sub-c-bae229b6-cf5e-4462-ab2f-83f5959ea751";
</script>

<style>
body{margin:0;font-family:system-ui;background:#050508;color:#fff}
.screen{display:none;height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

.card{background:#111;border:1px solid #222;padding:20px;border-radius:12px;width:300px}

input,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}

input{background:#0b0b12;color:white;border:1px solid #222}

button{background:#8a2be2;color:white;cursor:pointer}

.chat{display:flex;flex-direction:column;height:100vh}
.header{padding:10px;border-bottom:1px solid #222;display:flex;justify-content:space-between}
.messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.msg{padding:8px;border-radius:10px;background:#1a1a24;max-width:70%}
.me{align-self:flex-end;background:#2a1450}
.inputbar{display:flex;padding:10px;gap:10px;border-top:1px solid #222}
.inputbar input{flex:1}
</style>

</head>

<body>

<!-- JOIN -->
<div id="join" class="screen active">
  <div class="card">
    <h2>Nexus</h2>
    <input id="name" placeholder="username"/>
    <input id="room" placeholder="room code"/>
    <button onclick="join()">Join Room</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen chat">
  <div class="header">
    <div id="roomLabel"></div>
    <button onclick="leave()">leave</button>
  </div>

  <div id="msgs" class="messages"></div>

  <div class="inputbar">
    <input id="msg" placeholder="message"/>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

let pubnub;
let me="";
let room="";

function join(){
  me=document.getElementById("name").value.trim();
  room=document.getElementById("room").value.trim();

  if(!me||!room){
    alert("enter name + room");
    return;
  }

  document.getElementById("join").classList.remove("active");
  document.getElementById("chat").classList.add("active");

  document.getElementById("roomLabel").innerText="#"+room;

  pubnub=new PubNub({
    publishKey:PUBNUB_PUBLISH_KEY,
    subscribeKey:PUBNUB_SUBSCRIBE_KEY,
    uuid:me
  });

  pubnub.addListener({
    message:function(e){
      addMsg(e.message.sender,e.message.text);
    }
  });

  pubnub.subscribe({channels:[room]});
}

function send(){
  let t=document.getElementById("msg").value.trim();
  if(!t)return;

  document.getElementById("msg").value="";

  pubnub.publish({
    channel:room,
    message:{sender:me,text:t}
  });
}

function addMsg(n,t){
  let d=document.createElement("div");
  d.className="msg"+(n===me?" me":"");
  d.innerText=n+": "+t;
  document.getElementById("msgs").appendChild(d);
}

function leave(){
  location.reload();
}

</script>

</body>
</html>
