<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus by AstroFlux</title>

<!-- PubNub -->
<script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.js"></script>

<script>
/* =========================
   🔑 KEYS (KEEP HERE)
========================= */
const PUBNUB_PUBLISH_KEY   = "pub-c-0f810fcf-e8e9-4859-bba2-f35a6d515e57";
const PUBNUB_SUBSCRIBE_KEY = "sub-c-bae229b6-cf5e-4462-ab2f-83f5959ea751";
</script>

<style>
/* =========================
   CORE DESIGN SYSTEM
========================= */
:root{
  --bg:#050508;
  --panel:rgba(18,18,28,0.7);
  --border:rgba(255,255,255,0.06);
  --accent:#8a2be2;
  --glow:rgba(138,43,226,0.35);
  --text:#e8e8f0;
  --muted:#6b6b88;
  --radius:16px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,sans-serif;
  background:radial-gradient(circle at top,#0a0a12,var(--bg));
  color:var(--text);
  height:100vh;
}

/* =========================
   SCREEN SYSTEM
========================= */
.screen{
  display:none;
  height:100%;
  animation:fade .35s ease;
}
.screen.active{
  display:flex;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* =========================
   LOGIN
========================= */
#join{
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
}

.logo{
  font-size:3.2rem;
  font-weight:800;
  letter-spacing:-2px;
}
.logo span{color:var(--accent)}

.card{
  width:100%;
  max-width:380px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  backdrop-filter:blur(14px);
}

input{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0b0b12;
  color:white;
  outline:none;
  transition:.2s;
}
input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--glow);
  transform:scale(1.02);
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  box-shadow:0 0 18px var(--glow);
  transform:translateY(-1px);
}

/* =========================
   CHAT
========================= */
#chat{
  flex-direction:column;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-bottom:1px solid var(--border);
}

.room{
  color:var(--accent);
  font-weight:700;
}

.messages{
  flex:1;
  overflow:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  background:var(--panel);
  border:1px solid var(--border);
  animation:pop .2s ease;
}

@keyframes pop{
  from{transform:scale(.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

.msg.me{
  align-self:flex-end;
  background:rgba(138,43,226,0.12);
  border-color:rgba(138,43,226,0.3);
}

.msg .name{
  font-size:.7rem;
  opacity:.6;
}

.inputbar{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--border);
}

.inputbar input{
  flex:1;
}

.smallbtn{
  width:60px;
}
</style>
</head>

<body>

<!-- JOIN -->
<div id="join" class="screen active">
  <div class="logo">Ne<span>/</span>xus</div>

  <div class="card">
    <input id="name" placeholder="username"/>
    <input id="room" placeholder="room code"/>
    <button onclick="join()">Join</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <div class="header">
    <div class="room" id="roomLabel"></div>
    <button onclick="leave()">leave</button>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="inputbar">
    <input id="msg" placeholder="message"/>
    <button class="smallbtn" onclick="send()">→</button>
  </div>
</div>

<script>
let pubnub, me="", room="";

function join(){
  me=document.getElementById("name").value;
  room=document.getElementById("room").value;

  if(!me||!room)return;

  document.getElementById("join").classList.remove("active");
  document.getElementById("chat").classList.add("active");

  document.getElementById("roomLabel").innerText="#"+room;

  pubnub=new PubNub({
    publishKey:pub-c-0f810fcf-e8e9-4859-bba2-f35a6d515e57,
    subscribeKey:sub-c-bae229b6-cf5e-4462-ab2f-83f5959ea751,
    uuid:me
  });

  pubnub.addListener({
    message:function(e){
      add(e.message.sender,e.message.text);
    }
  });

  pubnub.subscribe({channels:[room]});
}

function send(){
  let t=document.getElementById("msg").value;
  document.getElementById("msg").value="";
  if(!t)return;

  pubnub.publish({
    channel:room,
    message:{sender:me,text:t}
  });
}

function add(n,t){
  let d=document.createElement("div");
  d.className="msg "+(n===me?"me":"");
  d.innerHTML=`<div class="name">${n}</div>${t}`;
  document.getElementById("msgs").appendChild(d);
}

function leave(){
  location.reload();
}
</script>

</body>
</html>
