  position:relative;
  user-select:none;
}
/* The slash — the whole identity */
.wordmark .slash{
  display:inline-block;
  color:transparent;
  background:linear-gradient(160deg,#c084fc 0%,#8a2be2 55%,#5b10b8 100%);

}

<script>
/* ── Particle canvas background ── */
(function(){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  let W,H,pts=[];

  function resize(){
    W=cv.width=innerWidth;
    H=cv.height=innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  const N=90;
  for(let i=0;i<N;i++){
    pts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*0.18,
      vy:(Math.random()-0.5)*0.18,
      r:Math.random()*1.2+0.2,
      a:Math.random()
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    /* connect nearby particles */
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<140){
          const op=(1-d/140)*0.25;
          ctx.beginPath();
          ctx.strokeStyle=`rgba(138,43,226,${op})`;
          ctx.lineWidth=0.6;
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.stroke();
        }
      }
    }

    /* dots */
    for(const p of pts){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(168,85,247,${p.a*0.55})`;
      ctx.fill();
      /* move */
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── App logic ── */
let pn=null,myName='',myRoom='';

const JS=document.getElementById('join-screen');
const CS=document.getElementById('chat-screen');
const uname=document.getElementById('uname');
const rcode=document.getElementById('rcode');
const jbtn=document.getElementById('jbtn');
const jerr=document.getElementById('jerr');
const msgs=document.getElementById('msgs');
const mi=document.getElementById('mi');
const sbtn=document.getElementById('sbtn');
const rdsp=document.getElementById('rdsp');
const lbtn=document.getElementById('lbtn');

[uname,rcode].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doJoin()}));
jbtn.addEventListener('click',doJoin);

/* Ripple effect on join button */
jbtn.addEventListener('mousedown',function(e){
  const r=this.getBoundingClientRect();
  const rip=document.createElement('span');
  rip.className='rip';
  const s=Math.max(this.offsetWidth,this.offsetHeight);
  rip.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-r.left-s/2}px;top:${e.clientY-r.top-s/2}px`;
  this.appendChild(rip);
  setTimeout(()=>rip.remove(),600);
});

function doJoin(){
  const n=uname.value.trim(),r=rcode.value.trim();
  if(!n){jerr.textContent='Enter a handle.';return}
  if(!r){jerr.textContent='Enter a room code.';return}
  if(PUBNUB_PUBLISH_KEY.startsWith('PASTE')||PUBNUB_SUBSCRIBE_KEY.startsWith('PASTE')){
    jerr.textContent='Add your PubNub keys at the top of index.html first.';return;
  }
  jerr.textContent='';
  myName=n;myRoom=r;
  rdsp.textContent='#'+myRoom;

  JS.classList.add('x-out');
  setTimeout(()=>{
    JS.classList.remove('active','x-out');
    CS.classList.add('active','x-in');
    CS.addEventListener('animationend',()=>CS.classList.remove('x-in'),{once:true});
  },300);

  initPN();
}

function initPN(){
  pn=new PubNub({
    publishKey:PUBNUB_PUBLISH_KEY,
    subscribeKey:PUBNUB_SUBSCRIBE_KEY,
    uuid:myName+'_'+Math.random().toString(36).slice(2,7)
  });
  pn.addListener({
    message(ev){const d=ev.message;addMsg(d.sender,d.text,d.sender===myName,false)},
    status(ev){
      if(ev.category==='PNConnectedCategory')sysmsg(myName+' joined the room');
      if(ev.category==='PNNetworkIssuesCategory'||ev.category==='PNNetworkDownCategory')sysmsg('Connection lost — reconnecting…');
    }
  });
  pn.subscribe({channels:[myRoom]});
  mi.focus();
}

mi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
sbtn.addEventListener('click',send);
function send(){
  const t=mi.value.trim();
  if(!t||!pn)return;
  mi.value='';
  pn.publish({channel:myRoom,message:{sender:myName,text:t}});
}

function addMsg(sender,text,own,sys){
  const es=document.getElementById('empty');
  if(es)es.remove();

  const w=document.createElement('div');
  w.className='msg '+(sys?'sys':own?'own':'other');

  const now=new Date();
  const ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');

  if(!sys){
    const devBadge=sender==='ASTRO'?'<span class="dev-tag">DEV</span>':'';
    w.innerHTML=`<div class="bbl"><div class="txt">${esc(text)}</div></div><div class="meta"><span class="auth">${esc(sender)}</span>${devBadge}<span class="ts">${ts}</span></div>`;
  } else {
    w.innerHTML=`<div class="bbl"><div class="txt">${esc(text)}</div></div>`;
    w.classList.add('in');
  }

  msgs.appendChild(w);
  if(!sys) requestAnimationFrame(()=>requestAnimationFrame(()=>w.classList.add('in')));
  msgs.scrollTop=msgs.scrollHeight;
}

function sysmsg(t){addMsg('',t,false,true)}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

lbtn.addEventListener('click',doLeave);
function doLeave(){
  if(pn){pn.unsubscribeAll();pn=null}
  msgs.innerHTML=`<div class="empty" id="empty"><div class="empty-ring">✦</div><p>No messages yet</p><p style="font-size:0.7rem;margin-top:2px">Say something to start</p></div>`;

  CS.classList.add('x-out');
  setTimeout(()=>{
    CS.classList.remove('active','x-out');
    JS.classList.add('active','x-in');
    JS.addEventListener('animationend',()=>JS.classList.remove('x-in'),{once:true});
    uname.focus();
  },300);
}
</script>
</body>
