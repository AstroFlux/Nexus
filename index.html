<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus</title>

<!-- PubNub SDK -->
<script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.js"></script>

<!-- FIREBASE IMPORTS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDpX1QCE_REPLACE_IF_NEEDED",
  authDomain: "nexus-c1e64.firebaseapp.com",
  projectId: "nexus-c1e64",
  storageBucket: "nexus-c1e64.firebasestorage.app",
  messagingSenderId: "233723930326",
  appId: "1:233723930326:web:8560a2e9e40e722ebd0b77"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let pubnub;
let currentUser = null;

/* LOGIN */
window.signup = async () => {
  const email = emailEl().value;
  const pass = passEl().value;
  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    setStatus("Account created. Now login.");
  } catch (e) {
    setStatus(e.message);
  }
};

window.login = async () => {
  const email = emailEl().value;
  const pass = passEl().value;

  try {
    const res = await signInWithEmailAndPassword(auth, email, pass);
    currentUser = res.user;
    startChat();
  } catch (e) {
    setStatus(e.message);
  }
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

/* START CHAT */
function startChat() {
  document.getElementById("loginScreen").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");

  pubnub = new PubNub({
    publishKey: PUBNUB_PUBLISH_KEY,
    subscribeKey: PUBNUB_SUBSCRIBE_KEY,
    uuid: currentUser.email
  });

  pubnub.addListener({
    message: function (e) {
      addMsg(e.message.sender, e.message.text);
    }
  });

  pubnub.subscribe({ channels: ["global"] });
}

/* SEND MESSAGE */
window.send = function () {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  input.value = "";

  pubnub.publish({
    channel: "global",
    message: {
      sender: currentUser.email,
      text
    }
  });
};

/* UI HELPERS */
function addMsg(sender, text) {
  const div = document.createElement("div");
  div.className = "msg" + (sender === currentUser.email ? " me" : "");
  div.innerText = sender + ": " + text;
  document.getElementById("msgs").appendChild(div);
}

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

function emailEl() { return document.getElementById("email"); }
function passEl() { return document.getElementById("password"); }

</script>

<!-- PUBNUB KEYS (PUT YOUR REAL KEYS HERE) -->
<script>
const PUBNUB_PUBLISH_KEY = "PASTE_PUBLISH_KEY_HERE";
const PUBNUB_SUBSCRIBE_KEY = "PASTE_SUBSCRIBE_KEY_HERE";
</script>

<style>
body { margin:0; font-family:system-ui; background:#050508; color:white; }

.screen { display:none; height:100vh; align-items:center; justify-content:center; flex-direction:column; }
.active { display:flex; }

.card { background:#111; padding:20px; border-radius:12px; width:300px; display:flex; flex-direction:column; gap:10px; }

input { padding:10px; border-radius:8px; border:none; background:#222; color:white; }

button { padding:10px; border:none; border-radius:8px; background:#8a2be2; color:white; cursor:pointer; }

.chat { display:flex; flex-direction:column; height:100vh; }

.header { padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; }

.messages { flex:1; overflow:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }

.msg { background:#1a1a24; padding:8px; border-radius:8px; max-width:70%; }
.me { align-self:flex-end; background:#2a1450; }

.inputbar { display:flex; gap:10px; padding:10px; border-top:1px solid #222; }

.inputbar input { flex:1; }
</style>

</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen active">
  <div class="card">
    <h2>Nexus Login</h2>

    <input id="email" placeholder="email"/>
    <input id="password" type="password" placeholder="password"/>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="status"></p>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="screen chat">

  <div class="header">
    <div>Nexus Chat</div>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="msgs" class="messages"></div>

  <div class="inputbar">
    <input id="msg" placeholder="message"/>
    <button onclick="send()">Send</button>
  </div>

</div>

</body>
</html>
